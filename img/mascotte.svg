      <circle cx="12" cy="56" r="8.5"/>
      <circle cx="16" cy="67" r="8.5"/>
      <circle cx="24" cy="71" r="7"/>
      <circle cx="24" cy="54" r="10"/>
      <circle cx="102" cy="46" r="9.5"/>
      <circle cx="108" cy="56" r="8.5"/>
      <circle cx="104" cy="67" r="8.5"/>
      <circle cx="96" cy="71" r="7"/>
      <circle cx="96" cy="54" r="10"/>
